CONFIG_ZMK_KEYBOARD_NAME="roBa KESB L"

CONFIG_ZMK_BLE=n
CONFIG_ZMK_SPLIT_BLE=n
CONFIG_ZMK_SPLIT_WIRED=n

# kumbung01 ESB peripheral, ID 0 = left
CONFIG_ZMK_SPLIT_ESB=y
CONFIG_ZMK_SPLIT_ESB_PERIPHERAL_ID=0

CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
CONFIG_ESB_MAX_PAYLOAD_LENGTH=48
CONFIG_ESB_TX_RINGBUF=y
CONFIG_ESB_TX_RINGBUF_SIZE=400

CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y
CONFIG_INPUT=y
CONFIG_GPIO=y

CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000

CONFIG_ZMK_BATTERY=y
CONFIG_ZMK_BATTERY_REPORTING=y

# Logging
CONFIG_ZMK_USB_LOGGING=y
CONFIG_ZMK_LOG_LEVEL_DBG=y
CONFIG_ZMK_SPLIT_ESB_LOG_LEVEL_DBG=y
CONFIG_LOG_BUFFER_SIZE=16384
CONFIG_LOG_PROCESS_THREAD_STARTUP_DELAY_MS=8000

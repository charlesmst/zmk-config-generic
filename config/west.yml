manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: charlesmst
      url-base: https://github.com/charlesmst
    - name: hsgw
      url-base: https://github.com/hsgw
    - name: damex
      url-base: https://github.com/damex
    - name: nrfconnect
      url-base: https://github.com/nrfconnect
    - name: urob
      url-base: https://github.com/urob
    - name: ggrocer
      url-base: https://github.com/greengrocer98

  projects:
    - name: zmk
      remote: charlesmst
      revision: feat/deskhop-sync
      import: app/west.yml

    - name: zmk-pmw3610-driver
      remote: charlesmst
      repo-path: zmk-pmw3610-driver-efog
      revision: zmk0.4

    - name: zmk-paw3395-driver
      remote: ggrocer
      revision: main

    - name: zmk-vfx-rgbled-indicator
      remote: ggrocer
      revision: main

    # charlesmst fork: adds a zmk_display_status_screen() prototype so the
    # module's -Werror=missing-prototypes build passes against ZMK's K&R header.
    - name: zmk-vfx-retro
      remote: charlesmst
      revision: compat/zmk-status-screen-prototype

    - name: zmk-input-processor-accel
      remote: charlesmst
      revision: main

    - name: zmk-tri-state
      path: modules/zmk/tri-state
      remote: charlesmst
      revision: feat/hold-start

    - name: zmk-behavior-stepped-scroll
      remote: damex
      revision: main

    - name: zmk-behavior-button-direct
      remote: damex
      revision: v0.1.1

    - name: zmk-feature-sensor_rotation
      remote: hsgw
      revision: main

    - name: zmk-feature-split-esb
      remote: damex
      revision: v0.4.2
      import: true

  self:
    path: config

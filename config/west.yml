manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: charlesmst
      url-base: https://github.com/charlesmst
    - name: urob
      url-base: https://github.com/urob

  projects:
    - name: zmk
      remote: zmkfirmware
      revision: main
      import: app/west.yml

    - name: zmk-pmw3610-driver
      remote: charlesmst
      repo-path: zmk-pmw3610-driver-efog
      revision: feat/dynamic-pmw3610-report-rate

    - name: zmk-input-processor-accel
      remote: charlesmst
      revision: main

    - name: zmk-tri-state
      path: modules/zmk/tri-state
      remote: urob
      revision: main

  self:
    path: config

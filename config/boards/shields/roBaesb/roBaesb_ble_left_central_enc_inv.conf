CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y

CONFIG_ZMK_USB_LOGGING=y
CONFIG_ZMK_LOG_LEVEL_DBG=y
CONFIG_ZMK_SPLIT_ESB_LOG_LEVEL_DBG=y
CONFIG_LOG_BUFFER_SIZE=16384

CONFIG_ZMK_KEYBOARD_NAME="roBa BLE L"

CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y
CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_INPUT=y
CONFIG_GPIO=y
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

CONFIG_ZMK_DESKHOP_SYNC_REPORT=y
CONFIG_ZMK_DESKHOP_SYNC_REPORT_ID=0x7E

CONFIG_ZMK_BLE=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
# Push Windows away from 7.5ms intervals — leaves more radio time for ESB.
# Units: 1.25ms. 9=11.25ms, 12=15ms.
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=9
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
CONFIG_ZMK_SPLIT_BLE=n
CONFIG_ZMK_SPLIT_WIRED=n
CONFIG_ZMK_SPLIT_ESB=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=4
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=n
CONFIG_BT_MAX_PAIRED=5

CONFIG_ZMK_SPLIT_ESB_PROTO_MSGQ_ITEMS=64
CONFIG_ZMK_SPLIT_ESB_EVENT_BUFFER_ITEMS=64
CONFIG_ZMK_SPLIT_ESB_CMD_BUFFER_ITEMS=16
CONFIG_ZMK_SPLIT_ESB_PROTO_TX_RETRANSMIT_COUNT=3
CONFIG_ZMK_SPLIT_ESB_PROTO_TX_RETRANSMIT_DELAY=600

CONFIG_MPSL_TIMESLOT_SESSION_COUNT=2
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_ESB_MAX_PAYLOAD_LENGTH=48
CONFIG_ESB_TX_FIFO_SIZE=16
CONFIG_CRC=y

CONFIG_ZMK_USB=y
CONFIG_ZMK_BATTERY_REPORTING=n

CONFIG_NEWLIB_LIBC=y

CONFIG_INPUT_THREAD_STACK_SIZE=8192
CONFIG_INPUT_QUEUE_MAX_MSGS=512

CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=n

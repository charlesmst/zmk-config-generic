manifest:
  remotes:
    - name: nrfconnect
      url-base: https://github.com/nrfconnect
    - name: badjeff
      url-base: https://github.com/badjeff
    - name: efogdev
      url-base: https://github.com/efogdev
    - name: charlesmst
      url-base: https://github.com/charlesmst
    - name: urob
      url-base: https://github.com/urob

  projects:
    - name: zmk
      remote: charlesmst
      revision: deskhop-sync-feature-report-v030
      import: app/west.yml

    - name: zmk-feature-split-esb
      remote: charlesmst
      revision: fix/esb-jitter-hfxo

    - name: sdk-nrf
      remote: nrfconnect
      revision: v2.6.4
      path: nrf

    - name: nrfxlib
      remote: nrfconnect
      revision: v2.6.4
      repo-path: sdk-nrfxlib
      path: nrfxlib

    - name: zmk-pmw3610-driver
      remote: efogdev
      revision: main

    - name: zmk-input-processor-report-rate-limit
      remote: badjeff
      revision: main

    - name: zmk-input-processor-xyz
      remote: badjeff
      revision: main

    - name: zmk-dongle-display
      remote: charlesmst
      revision: v0.3-peripheral-connected

    - name: zmk-input-processor-accel
      remote: charlesmst
      revision: main

    - name: zmk-tri-state
      path: modules/zmk/tri-state
      remote: urob
      revision: v0.3.0

  self:
    path: config

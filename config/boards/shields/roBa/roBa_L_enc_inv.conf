CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_OWN_THREAD=y

CONFIG_ZMK_SPLIT_BLE_PERIPHERAL_STACK_SIZE=1024

CONFIG_ZMK_BATTERY_REPORTING=y

# Sleep after 5 mins idle
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000

CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=100

# Issue #3381: sub-7.5ms low-latency BLE split (peripheral side)
CONFIG_BT_CTLR_ADVANCED_FEATURES=y
CONFIG_BT_CTLR_CONN_INTERVAL_LOW_LATENCY=y
CONFIG_BT_CONN_PARAM_ANY=y
CONFIG_BT_CTLR_ASSERT_OVERHEAD_START=n
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=2
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=2
CONFIG_BT_PERIPHERAL_PREF_LATENCY=100
CONFIG_BT_GAP_AUTO_UPDATE_CONN_PARAMS=y
CONFIG_BT_CONN_PARAM_UPDATE_TIMEOUT=1000

CONFIG_ZMK_KEYBOARD_NAME="Charybdis ESB"

# USB dongle — no BLE to host
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=n
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=n
CONFIG_ZMK_SPLIT_WIRED=n

# Damex ESB central
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
CONFIG_ZMK_SPLIT_ESB=y
CONFIG_ZMK_SPLIT_ESB_MAX_PAYLOAD=48
CONFIG_ESB_MAX_PAYLOAD_LENGTH=48
CONFIG_CRC=y

CONFIG_ZMK_SPLIT_ESB_RX_THREAD_STACK_SIZE=4096

# Mouse / trackball via split
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y
CONFIG_INPUT=y
CONFIG_GPIO=y

CONFIG_ZMK_BEHAVIORS_QUEUE_SIZE=512

CONFIG_ZMK_BATTERY=y
CONFIG_ZMK_BATTERY_REPORTING=y

# OLED dongle display (nice!nano central; disabled on the MDK dongle via its
# board conf). Custom status screen shares src/dongle_battery_display.c.
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_STACK_SIZE=4096
CONFIG_LV_Z_MEM_POOL_SIZE=16384
CONFIG_LV_COLOR_DEPTH_1=y
CONFIG_LV_Z_BITS_PER_PIXEL=1
CONFIG_LV_Z_VDB_SIZE=64
CONFIG_LV_DPI_DEF=148
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_ROBA_DONGLE_BATTERY_DISPLAY=y
CONFIG_LV_FONT_MONTSERRAT_12=y
CONFIG_LV_FONT_DEFAULT_MONTSERRAT_12=y
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y
CONFIG_ZMK_IDLE_TIMEOUT=300000
CONFIG_DISPLAY_INIT_PRIORITY=95

# Logging
CONFIG_ZMK_LOG_LEVEL_WRN=y
CONFIG_ZMK_SPLIT_ESB_LOG_LEVEL_INF=y
CONFIG_INPUT_LOG_LEVEL_WRN=y
CONFIG_LOG_BUFFER_SIZE=4096
CONFIG_LOG_PROCESS_THREAD_STARTUP_DELAY_MS=500
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=3
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=n

# DeskHop layer sync via vendor HID collection (output A=layer 0, B=layer 1)
CONFIG_ZMK_DESKHOP_SYNC_REPORT=y
CONFIG_ZMK_DESKHOP_SYNC_LAYER_A=0
CONFIG_ZMK_DESKHOP_SYNC_LAYER_B=1

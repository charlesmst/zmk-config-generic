CONFIG_ZMK_KEYBOARD_NAME="Charybdis ESB R"

CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_BLE=n
CONFIG_ZMK_SPLIT_BLE=n
CONFIG_ZMK_SPLIT_WIRED=n

# Damex ESB peripheral, ID comes from zmk,esb-self = &esb_right
CONFIG_ZMK_SPLIT_ESB=y
# Radio ISR must preempt SPIM/USBD/GPIOTE (all default priority 1), or equal-priority
# ISR latency can wedge the ESB ACK/retransmit state machine.
CONFIG_ESB_RADIO_IRQ_PRIORITY=0

CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
CONFIG_ZMK_SPLIT_ESB_MAX_PAYLOAD=48
CONFIG_ESB_MAX_PAYLOAD_LENGTH=48
CONFIG_CRC=y

CONFIG_ZMK_SPLIT_ESB_RX_THREAD_STACK_SIZE=4096

CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y
CONFIG_INPUT=y
CONFIG_GPIO=y
CONFIG_SPI=y

# Trackball: same efogtech PMW3610 driver as roBa
CONFIG_PMW3610=y
CONFIG_PMW3610_RUN_DOWNSHIFT_TIME_MS=3264
CONFIG_PMW3610_ENDPOINT_RATE_NOTIFY=y

# Wake-from-idle latency vs battery. force-awake pins the sensor at the run rate
# while ZMK is ACTIVE, but on_activity_state releases it to hardware downshift on
# IDLE (30s of no input). At the driver defaults it then sinks to REST2 (100ms
# sample) after 5s and REST3 (500ms) after ~22s, so the first move after a pause
# stalls a REST tick + ramp — the "needs some ms to start responding" lag.
# Bound that: linger in the fast 20ms REST1 tier for 30s (covers a quick return),
# and cap the deeper tiers at 40/60ms so the worst case is ~60ms instead of 500ms.
# The sensor still rests (20-60ms = 50-17Hz vs 500Hz run), so idle draw stays low.
CONFIG_PMW3610_REST1_SAMPLE_TIME_MS=20
CONFIG_PMW3610_REST1_DOWNSHIFT_TIME_MS=30000
CONFIG_PMW3610_REST2_SAMPLE_TIME_MS=40
CONFIG_PMW3610_REST2_DOWNSHIFT_TIME_MS=60000
CONFIG_PMW3610_REST3_SAMPLE_TIME_MS=60

# hsgw sensor_rotation input processor (orientation correction, true rotation)
CONFIG_SENSOR_ROTATION=y
# Postpone the sensor power-up/init sequence. This is non-blocking (the driver
# schedules init as delayed work and returns), so the keyboard + ESB link still
# come up immediately — only the trackball goes live this much later. Set high
# Bisecting the boot-time race window: at the default ~60ms the self-test fails
# and retries (the "slow to start" bug); at 40s it inits cleanly first try.
# 3s is the next test point toward a shippable value.
CONFIG_PMW3610_INIT_POWER_UP_EXTRA_DELAY_MS=50

# Full per-step async-init trace (PMW3610 async init step N, self-test, etc.)
CONFIG_PMW3610_LOG_LEVEL_DBG=y

CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

CONFIG_ZMK_BATTERY=y
CONFIG_ZMK_BATTERY_REPORTING=y

# Logging
CONFIG_ZMK_LOG_LEVEL_WRN=y
CONFIG_ZMK_SPLIT_ESB_LOG_LEVEL_DBG=y
CONFIG_INPUT_LOG_LEVEL_WRN=y
CONFIG_LOG_BUFFER_SIZE=4096
CONFIG_LOG_PROCESS_THREAD_STARTUP_DELAY_MS=500

CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y

CONFIG_ZMK_LOG_LEVEL_DBG=y
CONFIG_ZMK_SPLIT_ESB_LOG_LEVEL_DBG=y
CONFIG_LOG_BUFFER_SIZE=16384

CONFIG_ZMK_KEYBOARD_NAME="Lariska ESB"

CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y
CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_INPUT=y
CONFIG_GPIO=y
CONFIG_SPI=y


# Sleep after 5 mins idle
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000

CONFIG_ZMK_BLE=n
CONFIG_ZMK_USB=n
CONFIG_ZMK_SPLIT_BLE=n
CONFIG_ZMK_SPLIT_WIRED=n
CONFIG_ZMK_SPLIT_ESB=y
CONFIG_ZMK_SPLIT_ESB_PERIPHERAL_ID=3
# ACK on: movement is sent single-shot (no retransmit) but acked, so a lost
# delta is detected and folded into the next movement instead of retransmitted.
CONFIG_ZMK_SPLIT_ESB_PROTO_TX_ACK=y
CONFIG_ZMK_SPLIT_ESB_PROTO_MSGQ_ITEMS=64
CONFIG_ZMK_SPLIT_ESB_EVENT_BUFFER_ITEMS=64
CONFIG_ZMK_SPLIT_ESB_CMD_BUFFER_ITEMS=16
CONFIG_ZMK_SPLIT_ESB_PROTO_TX_RETRANSMIT_COUNT=3
CONFIG_ZMK_SPLIT_ESB_PROTO_TX_RETRANSMIT_DELAY=600

CONFIG_MPSL_TIMESLOT_SESSION_COUNT=1
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_ESB_MAX_PAYLOAD_LENGTH=48
CONFIG_ESB_TX_FIFO_SIZE=8
CONFIG_CRC=y

CONFIG_NEWLIB_LIBC=y

CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60

CONFIG_INPUT_THREAD_STACK_SIZE=8192
CONFIG_INPUT_QUEUE_MAX_MSGS=512

CONFIG_PAW3395=y
CONFIG_PAW3395_REPORT_INTERVAL_MIN=8
# Output-driven rate switching: central broadcasts USB/BLE over ESB, driver
# adjusts report_interval_ms (usb-rate-ms / ble-rate-ms in the overlay).
# Coexists with the DPI button below — last writer wins, so the button still
# overrides manually until the next USB/BLE switch.
CONFIG_PAW3395_OUTPUT_RATE_NOTIFY=y
CONFIG_PAW3395_RATE_CYCLE_GPIO=y

# Battery indicator LED (RGB)
CONFIG_VFX_RGBLED_INDICATOR=y
CONFIG_VFX_LDO_PIN=y
CONFIG_VFX_CHRG_PIN=y

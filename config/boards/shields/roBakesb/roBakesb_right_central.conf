CONFIG_ZMK_KEYBOARD_NAME="roBa KESB RC"

# USB right-half central, no BLE to host
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=n
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=n
CONFIG_ZMK_SPLIT_WIRED=n

# ESB enabled, keeping the right matrix local for smoke testing
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
CONFIG_ZMK_SPLIT_ESB=y
CONFIG_ESB_CENTRAL=y

CONFIG_CLOCK_CONTROL_NRF_K32SRC_XTAL=y
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_ZMK_SPLIT_ESB_MAX_PAYLOAD=48
CONFIG_ESB_RX_FIFO_SIZE=32

CONFIG_ZMK_MOUSE=n
CONFIG_ZMK_POINTING=n
CONFIG_INPUT=n
CONFIG_GPIO=y
CONFIG_SPI=y
CONFIG_NFCT_PINS_AS_GPIOS=y

# PMW3610 disabled for ESB/no-mouse smoke test
CONFIG_PMW3610=n

CONFIG_ZMK_BATTERY=y
CONFIG_ZMK_BATTERY_REPORTING=y

CONFIG_ZMK_HID_CONSUMER_REPORT_USAGES_FULL=y
CONFIG_ZMK_HID_INDICATORS=y
CONFIG_ZMK_BEHAVIORS_QUEUE_SIZE=512

# Logging
CONFIG_ZMK_LOG_LEVEL_DBG=y
CONFIG_ZMK_SPLIT_ESB_LOG_LEVEL_DBG=y
CONFIG_LOG_BUFFER_SIZE=16384
CONFIG_LOG_PROCESS_THREAD_STARTUP_DELAY_MS=8000

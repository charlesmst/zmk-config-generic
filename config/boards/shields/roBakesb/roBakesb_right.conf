CONFIG_ZMK_KEYBOARD_NAME="roBa KESB R"

CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_BLE=n
CONFIG_ZMK_SPLIT_BLE=n
CONFIG_ZMK_SPLIT_WIRED=n

# Damex ESB peripheral, ID comes from zmk,esb-self = &esb_right
CONFIG_ZMK_SPLIT_ESB=y

CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
CONFIG_ZMK_SPLIT_ESB_MAX_PAYLOAD=48
CONFIG_ESB_MAX_PAYLOAD_LENGTH=48
CONFIG_CRC=y

CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y
CONFIG_INPUT=y
CONFIG_GPIO=y
CONFIG_SPI=y


CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

CONFIG_ZMK_BATTERY=y


# Logging
CONFIG_ZMK_LOG_LEVEL_WRN=y
CONFIG_ZMK_SPLIT_ESB_LOG_LEVEL_WRN=y
CONFIG_INPUT_LOG_LEVEL_WRN=y
CONFIG_LOG_BUFFER_SIZE=4096
CONFIG_LOG_PROCESS_THREAD_STARTUP_DELAY_MS=500

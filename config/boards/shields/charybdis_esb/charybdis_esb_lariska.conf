CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y

CONFIG_ZMK_LOG_LEVEL_DBG=y
CONFIG_ZMK_SPLIT_ESB_LOG_LEVEL_DBG=y
CONFIG_INPUT_LOG_LEVEL_WRN=y
CONFIG_LOG_BUFFER_SIZE=4096
CONFIG_LOG_PROCESS_THREAD_STARTUP_DELAY_MS=0

CONFIG_ZMK_KEYBOARD_NAME="Charybdis ESB Lariska"

CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y
CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_INPUT=y
CONFIG_GPIO=y
CONFIG_SPI=y

# Sleep after 30 mins idle. Wakes on kscan (mouse buttons); cursor motion alone
# does not wake (driver has no motion wake source).
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

CONFIG_ZMK_BLE=n
CONFIG_ZMK_USB=n
CONFIG_ZMK_SPLIT_BLE=n
CONFIG_ZMK_SPLIT_WIRED=n
CONFIG_ZMK_SPLIT_ESB=y
CONFIG_ZMK_SPLIT_ESB_MAX_PAYLOAD=48
CONFIG_ESB_MAX_PAYLOAD_LENGTH=48
# Radio ISR must preempt SPIM/USBD/GPIOTE (all default priority 1): the ESB driver
# arms its ACK/retransmit timers inside this ISR within ~170-520us windows, and an
# equal-priority ISR delaying it past a window wedges the radio state machine.
CONFIG_ESB_RADIO_IRQ_PRIORITY=0
CONFIG_CRC=y

CONFIG_ZMK_BATTERY=y
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60

CONFIG_PAW3395=y
CONFIG_PAW3395_REPORT_INTERVAL_MIN=1

# Battery indicator LED (RGB)
CONFIG_VFX_RGBLED_INDICATOR=y
CONFIG_VFX_LDO_PIN=y
CONFIG_VFX_CHRG_PIN=y

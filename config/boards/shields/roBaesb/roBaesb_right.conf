CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y

CONFIG_ZMK_USB_LOGGING=y
CONFIG_ZMK_LOG_LEVEL_DBG=y
CONFIG_ZMK_SPLIT_ESB_LOG_LEVEL_DBG=y
CONFIG_LOG_BUFFER_SIZE=16384

CONFIG_ZMK_KEYBOARD_NAME="roBa ESB R"

CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y
CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_INPUT=y
CONFIG_GPIO=y
CONFIG_SPI=y

# Sleep after 30 mins idle. Wakes on kscan (right keys) or a mouse-button press;
# cursor motion alone does not wake (driver has no motion wake source).
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000
# Go to sleep ONLY AFTER 16 seconds on disconnected to central,
# central disconnection imply that it just fall asleep.
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=16000
# CONFIG_ZMK_INSOMNIA_PING_ON_START=y
# # set a ping before attempting to sleep AFTER 15 (minus 1 second, 1000ms)
# CONFIG_ZMK_INSOMNIA_PING_INTERVAL=15000

# Clear settings on start
# CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=y

# Allow second peripheral (for pairing trackball peripheral)
# CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2
# CONFIG_ZMK_SPLIT_BLE_PREF_WEAK_BOND=y
# # CONFIG_ZMK_SPLIT_BLE_PREF_CONTINUOUS_SCAN_WINDOW=30000
# CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# for battery reporting

CONFIG_ZMK_BLE=n
CONFIG_ZMK_SPLIT_BLE=n
CONFIG_ZMK_SPLIT_WIRED=n
CONFIG_ZMK_SPLIT_ESB=y
CONFIG_ZMK_SPLIT_ESB_PERIPHERAL_ID=2
CONFIG_ZMK_SPLIT_ESB_PROTO_TX_ACK=y
CONFIG_ZMK_SPLIT_ESB_PROTO_MSGQ_ITEMS=64
CONFIG_ZMK_SPLIT_ESB_EVENT_BUFFER_ITEMS=64
CONFIG_ZMK_SPLIT_ESB_CMD_BUFFER_ITEMS=16
CONFIG_ZMK_SPLIT_ESB_PROTO_TX_RETRANSMIT_COUNT=3
CONFIG_ZMK_SPLIT_ESB_PROTO_TX_RETRANSMIT_DELAY=600

CONFIG_MPSL_TIMESLOT_SESSION_COUNT=1
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_ESB_MAX_PAYLOAD_LENGTH=48
CONFIG_ESB_TX_FIFO_SIZE=16
CONFIG_CRC=y

CONFIG_NEWLIB_LIBC=y

CONFIG_PMW3610=y
# Output-driven rate switching: central broadcasts USB/BLE over ESB, driver
# adjusts the PERFORMANCE register (usb-rate-ms / ble-rate-ms in the overlay).
CONFIG_PMW3610_OUTPUT_RATE_NOTIFY=y
# CONFIG_PMW3610_LOG_LEVEL_OFF is not set
CONFIG_PMW3610_LOG_LEVEL_DBG=y
CONFIG_PMW3610_SQUAL_LOG=y
CONFIG_PMW3610_SQUAL_LOG_INTERVAL=500
CONFIG_PMW3610_RUN_DOWNSHIFT_TIME_MS=3264
CONFIG_PMW3610_REST1_SAMPLE_TIME_MS=20

CONFIG_ZMK_BATTERY_REPORTING=y

CONFIG_INPUT_THREAD_STACK_SIZE=8192
CONFIG_INPUT_QUEUE_MAX_MSGS=512

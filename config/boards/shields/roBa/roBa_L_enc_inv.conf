CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_OWN_THREAD=y

CONFIG_ZMK_SPLIT_BLE_PERIPHERAL_STACK_SIZE=1024

CONFIG_ZMK_BATTERY_REPORTING=y

# Sleep after 5 mins idle
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000

# Detect dongle reset faster so advertising restarts sooner (1s vs 4s default)
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=100
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12

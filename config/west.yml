manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: damex
      url-base: https://github.com/damex
    - name: nrfconnect
      url-base: https://github.com/nrfconnect
    - name: urob
      url-base: https://github.com/urob

  projects:
    - name: zmk
      remote: zmkfirmware
      revision: main
      import: app/west.yml

    - name: zmk-tri-state
      path: modules/zmk/tri-state
      remote: urob
      revision: main

    - name: zmk-feature-split-esb
      remote: damex
      revision: v0.2.3
      import: true

  self:
    path: config

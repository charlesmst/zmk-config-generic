# The Holyiot dongle has no OLED — turn the display subsystem off (the
# central shield's corne_esb.conf enables it for the nice!nano dongle).
CONFIG_ZMK_DISPLAY=n
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=n
CONFIG_ROBA_DONGLE_BATTERY_DISPLAY=n

# No OLED here, so the RGB LED is the only status indicator: layer color plus
# a per-peripheral low-battery blink (red=left, green=right, blue=lariska).
CONFIG_ROBA_PERIPHERAL_BATTERY_LED=y
CONFIG_ROBA_PERIPHERAL_BATTERY_LED_THRESHOLD=25
CONFIG_ROBA_LAYER_LED=y

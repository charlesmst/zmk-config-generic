CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y

CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_BEHAVIORS_QUEUE_SIZE=512

CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

CONFIG_BT_BUF_ACL_TX_COUNT=32
CONFIG_BT_L2CAP_TX_BUF_COUNT=32

CONFIG_ZMK_HID_INDICATORS=y
CONFIG_ROBA_DESKHOP_LAYER_SYNC=n
CONFIG_ZMK_HID_CONSUMER_REPORT_USAGES_FULL=y

# Move OLED/LVGL updates off the system work queue onto a dedicated thread.
# Default (SYSTEM) means lv_task_handler blocks sys_work_q via I2C every 10ms,
# starving zmk_endpoint_send_report and causing the trackball freeze.
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

CONFIG_ZMK_DISPLAY=y
# Dedicated display thread: if the display path hangs, it must not take the
# system work queue (USB, input processing) down with it.
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_STACK_SIZE=4096
# Generous LVGL heap to rule out OOM looping (default is only 4096).
CONFIG_LV_Z_MEM_POOL_SIZE=16384
# Canonical mono-OLED LVGL config — matches every upstream ZMK 0.4 SSD1306
# shield (e.g. splitkb_aurora Kconfig.defconfig). 1-bit rendering enables
# ZMK's mono theme and sizes buffers correctly for the conversion path.
CONFIG_LV_COLOR_DEPTH_1=y
CONFIG_LV_Z_BITS_PER_PIXEL=1
CONFIG_LV_Z_VDB_SIZE=64
CONFIG_LV_DPI_DEF=148

# Custom roBa status screen: per-peripheral battery + connection + layer.
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_ROBA_DONGLE_BATTERY_DISPLAY=y
CONFIG_LV_FONT_DEFAULT_MONTSERRAT_12=y
# Turn the OLED off after 5 minutes of inactivity. The central raises
# zmk_position_state_changed for every key event received from the peripherals
# over ESB, which keeps activity in the ACTIVE state; after IDLE_TIMEOUT with no
# such events ZMK transitions to IDLE and blanks (powers off) the SH1106 panel.
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y
CONFIG_ZMK_IDLE_TIMEOUT=300000
# Init the OLED late so the ext-power rail (POST_KERNEL 81 + 50ms delay) has
# fully stabilized; the working main-branch display_ble build needed this too.
CONFIG_DISPLAY_INIT_PRIORITY=95

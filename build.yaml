# This file generates the GitHub Actions matrix.
# For simple board + shield combinations, add them to the top level board and
# shield arrays, for more control, add individual board + shield combinations
# to the `include` property. You can also use the `cmake-args` property to
# pass flags to the build command and `artifact-name` to assign a name to
# distinguish build outputs from each other:
#
# board: [ "nice_nano_v2" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano_v2
#     shield: reviung41
#   - board: nice_nano_v2
#     shield: corne_left
#     cmake-args: -DCONFIG_ZMK_USB_LOGGING=y
#     artifact-name: corne_left_with_logging
#
---
include:
 # Charybdis ESB
 - board: nice_nano@2.0.0
   shield: charybdis_esb
   artifact-name: charybdis_esb_dongle
 - board: holyiot_dongle_1k
   shield: charybdis_esb
   artifact-name: charybdis_esb_dongle_holyiot
 - board: nice_nano@2.0.0
   shield: charybdis_esb_right
   artifact-name: charybdis_esb_right
 - board: nice_nano@2.0.0
   shield: charybdis_esb_left
   artifact-name: charybdis_esb_left

 # roBa ESB
 - board: nice_nano@2.0.0
   shield: roBaesb
   artifact-name: roBaesb_dongle
 - board: nice_nano@2.0.0
   shield: roBaesb
   cmake-args: -DDTS_EXTRA_CPPFLAGS=-DZMK_ESB_MOUSE -DCONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=3
   artifact-name: roBaesb_dongle_mouse
 - board: nice_nano@2.0.0
   shield: roBaesb_display_ble
   cmake-args: -DDTS_EXTRA_CPPFLAGS=-DZMK_ESB_MOUSE -DCONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=3
   artifact-name: roBaesb_dongle_ble_mouse
 - board: nice_nano@2.0.0
   shield: roBaesb_display dongle_display
   artifact-name: roBaesb_dongle_display
 - board: nice_nano@2.0.0
   shield: roBaesb_display_ble dongle_display
   artifact-name: roBaesb_dongle_display_ble
 - board: holyiot_dongle_1k
   shield: roBaesb
   artifact-name: roBaesb_dongle_holyiot
 - board: holyiot_dongle_1k
   shield: roBaesb
   cmake-args: -DDTS_EXTRA_CPPFLAGS=-DZMK_ESB_MOUSE -DCONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=3
   artifact-name: roBaesb_dongle_holyiot_mouse
 - board: seeeduino_xiao_ble
   shield: roBaesb_right
   artifact-name: roBaesb_right
 - board: seeeduino_xiao_ble
   shield: roBaesb_left
   artifact-name: roBaesb_left
 - board: seeeduino_xiao_ble
   shield: roBaesb_left_enc_inv
   artifact-name: roBaesb_left_enc_inv

 # roBa ESB keyboard B (second unit, separate ESB address)
 - board: nice_nano@2.0.0
   shield: roBaesb_display dongle_display
   cmake-args: -DDTS_EXTRA_CPPFLAGS="-DZMK_ESB_ADDR_B"
   artifact-name: roBaesb_dongle_display_b

 # roBa ESB A + lariska mouse (peripheral ID 2)
 - board: nice_nano@2.0.0
   shield: roBaesb_display dongle_display
   cmake-args: -DDTS_EXTRA_CPPFLAGS=-DZMK_ESB_MOUSE -DCONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=3
   snippet: zmk-usb-logging
   artifact-name: roBaesb_dongle_display_mouse_logging

 # roBa ESB B + lariska mouse (peripheral ID 2)
 - board: nice_nano@2.0.0
   shield: roBaesb_display dongle_display
   cmake-args: -DDTS_EXTRA_CPPFLAGS="-DZMK_ESB_ADDR_B;-DZMK_ESB_MOUSE" -DCONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=3
   artifact-name: roBaesb_dongle_display_mouse_b
 - board: nice_nano@2.0.0
   shield: roBaesb_display dongle_display
   cmake-args: -DDTS_EXTRA_CPPFLAGS="-DZMK_ESB_ADDR_B;-DZMK_ESB_MOUSE" -DCONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=3
   snippet: zmk-usb-logging
   artifact-name: roBaesb_dongle_display_mouse_b_logging
 - board: nice_nano@2.0.0
   shield: lariska_esb
   artifact-name: lariska_esb
 - board: nice_nano@2.0.0
   shield: lariska_esb
   cmake-args: -DDTS_EXTRA_CPPFLAGS=-DZMK_ESB_ADDR_B
   artifact-name: lariska_esb_b
 - board: nice_nano@2.0.0
   shield: lariska_esb
   cmake-args: -DDTS_EXTRA_CPPFLAGS=-DZMK_ESB_ADDR_B
   snippet: zmk-usb-logging
   artifact-name: lariska_esb_b_logging
 - board: seeeduino_xiao_ble
   shield: roBaesb_right
   cmake-args: -DDTS_EXTRA_CPPFLAGS="-DZMK_ESB_ADDR_B"
   artifact-name: roBaesb_right_b
 - board: seeeduino_xiao_ble
   shield: roBaesb_left
   cmake-args: -DDTS_EXTRA_CPPFLAGS="-DZMK_ESB_ADDR_B"
   artifact-name: roBaesb_left_b

 # roBa ESB right-central + BLE host experiment
 - board: seeeduino_xiao_ble
   shield: roBaesb_ble_right
   artifact-name: roBaesb_ble_right_central
 - board: seeeduino_xiao_ble
   shield: roBaesb_ble_left
   artifact-name: roBaesb_ble_left
 - board: seeeduino_xiao_ble
   shield: roBaesb_ble_left_enc_inv
   artifact-name: roBaesb_ble_left_enc_inv

 # roBa BLE
 - board: seeeduino_xiao_ble
   shield: roBa_R
   snippet: studio-rpc-usb-uart
 - board: seeeduino_xiao_ble
   shield: roBa_L
 - board: seeeduino_xiao_ble
   shield: roBa_L_enc_inv
   artifact-name: roBa_L_enc_inv
 - board: seeeduino_xiao_ble
   shield: roBa_dongle
   snippet: studio-rpc-usb-uart
   artifact-name: roBa_dongle
 - board: nice_nano_v2
   shield: roBa_nice_nano_dongle dongle_display
   artifact-name: roBa_nice_nano_dongle
 - board: seeeduino_xiao_ble
   shield: roBa_R_peripheral
   artifact-name: roBa_R_dongle_peripheral
 - board: seeeduino_xiao_ble
   shield: roBa_L
   cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
   artifact-name: roBa_L_dongle_peripheral
 - board: seeeduino_xiao_ble
   shield: settings_reset
 - board: nice_nano_v2
   shield: settings_reset

 # Charybdis BLE
 - board: nice_nano_v2
   shield: charybdis_right
   artifact-name: charybdis_right
 - board: nice_nano_v2
   shield: charybdis_left
   artifact-name: charybdis_left
 - board: nice_nano_v2
   shield: charybdis_dongle dongle_display
   artifact-name: charybdis_dongle
 - board: nice_nano_v2
   shield: charybdis_dongle_right
   artifact-name: charybdis_dongle_right
 - board: nice_nano_v2
   shield: charybdis_dongle_left
   artifact-name: charybdis_dongle_left

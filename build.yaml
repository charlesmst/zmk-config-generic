---
include:
  - board: xiao_ble//zmk
    shield: settings_reset
  # Roba ESB dongle on Holyiot nRF52840 dongle (no OLED)
  - board: holyiot_dongle_1k
    shield: roBakesb
    snippet: zmk-usb-logging
    artifact-name: roBakesb_dongle_holyiot

  # Damex ESB dongle setup (nice!nano v2 as USB central)
  - board: nice_nano@2.0.0//zmk
    shield: roBakesb
    snippet: zmk-usb-logging
    artifact-name: roBakesb_dongle

  # Damex ESB dongle on Makerdiary nRF52840 MDK USB Dongle
  - board: nrf52840_mdk_dongle
    shield: roBakesb
    snippet: zmk-usb-logging
    artifact-name: roBakesb_dongle_mdk

  - board: xiao_ble//zmk
    shield: roBakesb_left
    snippet: zmk-usb-logging
    artifact-name: roBakesb_left

  - board: xiao_ble//zmk
    shield: roBakesb_right
    snippet: zmk-usb-logging
    artifact-name: roBakesb_right

  # Debug builds: low-battery LED threshold forced to 95% so the blink triggers
  # at normal charge. Flash these to verify the LED, then flash the real
  # roBakesb_left / roBakesb_right (threshold 25%).
  - board: xiao_ble//zmk
    shield: roBakesb_left
    snippet: zmk-usb-logging
    cmake-args: -DCONFIG_ROBA_SELF_BATTERY_LED_THRESHOLD=95
    artifact-name: roBakesb_left_ledtest

  - board: xiao_ble//zmk
    shield: roBakesb_right
    snippet: zmk-usb-logging
    cmake-args: -DCONFIG_ROBA_SELF_BATTERY_LED_THRESHOLD=95
    artifact-name: roBakesb_right_ledtest

  - board: nice_nano@2.0.0//zmk
    shield: roBakesb_lariska
    snippet: zmk-usb-logging
    artifact-name: roBakesb_lariska

  # Charybdis ESB dongle setup (nice!nano v2 as USB central, OLED display)
  - board: nice_nano@2.0.0//zmk
    shield: charybdis_esb
    snippet: zmk-usb-logging
    artifact-name: charybdis_esb_dongle

  # Charybdis ESB dongle on Makerdiary nRF52840 MDK USB Dongle (no OLED)
  - board: nrf52840_mdk_dongle
    shield: charybdis_esb
    snippet: zmk-usb-logging
    artifact-name: charybdis_esb_dongle_mdk

  # Charybdis ESB dongle on Holyiot nRF52840 dongle (no OLED)
  - board: holyiot_dongle_1k
    shield: charybdis_esb
    snippet: zmk-usb-logging
    artifact-name: charybdis_esb_dongle_holyiot

  - board: nice_nano@2.0.0//zmk
    shield: charybdis_esb_left
    snippet: zmk-usb-logging
    artifact-name: charybdis_esb_left

  - board: nice_nano@2.0.0//zmk
    shield: charybdis_esb_right
    snippet: zmk-usb-logging
    artifact-name: charybdis_esb_right

  - board: nice_nano@2.0.0//zmk
    shield: charybdis_esb_lariska
    snippet: zmk-usb-logging
    artifact-name: charybdis_esb_lariska

  # Corne ESB dongle setup (nice!nano v2 as USB central, OLED display)
  - board: nice_nano@2.0.0//zmk
    shield: corne_esb
    snippet: zmk-usb-logging
    artifact-name: corne_esb_dongle

  # Corne ESB dongle on Makerdiary nRF52840 MDK USB Dongle (no OLED)
  - board: nrf52840_mdk_dongle
    shield: corne_esb
    snippet: zmk-usb-logging
    artifact-name: corne_esb_dongle_mdk

  # Corne ESB dongle on Holyiot nRF52840 dongle (no OLED)
  - board: holyiot_dongle_1k
    shield: corne_esb
    snippet: zmk-usb-logging
    artifact-name: corne_esb_dongle_holyiot

  # Corne halves with nice!view (stock shield stacked on top of ours)
  - board: nice_nano@2.0.0//zmk
    shield: corne_esb_left nice_view
    snippet: zmk-usb-logging
    artifact-name: corne_esb_left

  - board: nice_nano@2.0.0//zmk
    shield: corne_esb_right nice_view
    snippet: zmk-usb-logging
    artifact-name: corne_esb_right

  # Right half with a Cirque trackpad on the OLED header (no display)
  - board: nice_nano@2.0.0//zmk
    shield: corne_esb_right_cirque
    snippet: zmk-usb-logging
    artifact-name: corne_esb_right_cirque

  - board: nice_nano@2.0.0//zmk
    shield: corne_esb_lariska
    snippet: zmk-usb-logging
    artifact-name: corne_esb_lariska
